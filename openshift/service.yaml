# ============================================================
# Service (ClusterIP) për "Sistemi i Menaxhimit të Studentëve"
# Ekspozon aplikacionin brenda klasterit në portin 8080.
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: student-management
  labels:
    app: student-management
spec:
  type: ClusterIP
  selector:
    app: student-management
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP

# ============================================================
# Konfigurimi i aplikacionit - Sistemi i Menaxhimit te Studenteve
# Autor: Andis Ramja
# ============================================================
spring.application.name=student-management
server.port=8080

# Actuator: ekspozon endpoint-in e shendetit per probe-t e OpenShift (/actuator/health)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ============================================================
# Baza e te dhenave H2 (in-memory) - per zhvillim
# ============================================================
spring.datasource.url=jdbc:h2:mem:studentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Konsola web e H2-se: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Konfigurimi i JPA / Hibernate per H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Caktivizon "open-in-view" (praktike e rekomanduar per performance)
spring.jpa.open-in-view=false

# Lejon ekzekutimin e data.sql pasi Hibernate krijon skemen e tabelave
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

